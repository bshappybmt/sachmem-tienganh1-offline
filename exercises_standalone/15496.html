<body>
<div class="exercise-container" data-eid="15496">

  <div class="image-container text-center" style="margin: 0px auto; height: 100%; width: 100%; font-size: 39.1248px; padding-top: 0px; padding-bottom: 0px; line-height: 55.8925px;">
    <iframe class="game-iframe" src="https://www.sachmem.vn/v3/embeds/page/5f2e2217741cd07d5f66e30f" style="font-size: 39.1248px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 55.8925px;"></iframe>
  </div>

</div>
<script>
// Basic interaction for offline exercises
(function() {
  const container = document.querySelector('.exercise-container');
  const eid = container.dataset.eid;
  
  // Handle audio play - find all clickable elements
  document.addEventListener('click', function(e) {
    const img = e.target.closest('img');
    if (img) {
      // For point-and-say: clicking image plays corresponding audio
      console.log('Clicked image:', img.src);
    }
  });
  
  // For checkbox-style exercises (listen.tick)
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() {
      this.classList.toggle('checked');
    });
  });
})();
</script>
</body>
