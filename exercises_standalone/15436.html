<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun time 1 - Fun time 1 - 2 Let’s play.</title>
<base href="../">
<link rel="stylesheet" href="css/application.css">
<link rel="stylesheet" href="css/library.css">
<link rel="stylesheet" href="css/homepage.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
<style>
  body { margin: 0; overflow-x: hidden; background: #f0f4ff; }
  .exercise-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
</style>
</head>
<body>
<div class="exercise-container" data-eid="15436">

  <div id="hide_game" class="box-container box-middle box-center display-none" style="font-size: 39.1248px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 48.906px;"><i class="fa fa-times" aria-hidden="true" style="font-size: 39.1248px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 39.1248px;"></i></div>
  <div class="image-container text-center box-container box-middle box-center" style="margin: 0px auto; height: 100%; width: 100%; font-size: 39.1248px; padding-top: 0px; padding-bottom: 0px; line-height: 55.8925px;">
    <div id="show_game" class="mouse-volume" style="font-size: 39.1248px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 55.8925px;">
      <!-- ngIf: input.img.strim !='' --><img src="https://sachmem.net/trial/books/82/exercises/%7B%7Binput.img%7D%7D" style="max-width: 100%; font-size: 22.88px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 15px; line-height: 32.6857px;"><!-- end ngIf: input.img.strim !='' -->
      <div class="play-button box-container box-center box-middle" id="btn-play" style="font-size: 39.1248px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 55.8925px;">
        <img class="no-zoom blink play-button-img" src="https://cdn2.hoclieuthongminh.com/public/images-game/play2.png" style="height: 114.4px; font-size: 22.88px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 32.6857px;">
      </div>
    </div>
    <iframe class="game-iframe display-none" style="font-size: 39.1248px; margin-top: 0px; margin-bottom: 0px; padding-top: 0px; padding-bottom: 0px; line-height: 55.8925px;"></iframe>
  </div>

</div>
<script>
// Basic interaction for offline exercises
(function() {
  const container = document.querySelector('.exercise-container');
  const eid = container.dataset.eid;
  
  // Handle audio play - find all clickable elements
  document.addEventListener('click', function(e) {
    const img = e.target.closest('img');
    if (img) {
      // For point-and-say: clicking image plays corresponding audio
      console.log('Clicked image:', img.src);
    }
  });
  
  // For checkbox-style exercises (listen.tick)
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() {
      this.classList.toggle('checked');
    });
  });
})();
</script>
</body>
</html>
