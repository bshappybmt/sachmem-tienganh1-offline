<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tiếng Anh 1 - Global Success (Offline Interactive)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --sidebar-w: 320px;
    --sidebar-collapsed: 0px;
    --header-h: 56px;
    --footer-h: 64px;
    --primary: #1a73e8;
    --primary-light: #e8f0fe;
    --sidebar-bg: #2c3e50;
    --sidebar-text: #ecf0f1;
    --sidebar-active: #3498db;
    --border: #dee2e6;
  }
  
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body { display: flex; flex-direction: column; }
  
  /* Header */
  .header {
    height: var(--header-h);
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
  }
  .header .menu-btn {
    background: none; border: none; color: white; font-size: 24px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
  }
  .header .menu-btn:hover { background: rgba(255,255,255,0.15); }
  .header h1 { font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header .nav-btns { margin-left: auto; display: flex; gap: 4px; }
  .header .nav-btns button {
    background: rgba(255,255,255,0.15); border: none; color: white;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px;
  }
  .header .nav-btns button:hover { background: rgba(255,255,255,0.25); }
  .header .nav-btns button:disabled { opacity: 0.4; cursor: default; }
  
  /* Main layout */
  .main {
    display: flex; flex: 1; overflow: hidden; position: relative;
  }
  
  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    overflow-y: auto;
    flex-shrink: 0;
    transition: width 0.3s, margin-left 0.3s;
  }
  .sidebar.collapsed { width: 0; overflow: hidden; margin-left: calc(-1 * var(--sidebar-w)); }
  
  .sidebar .search-box { padding: 10px; }
  .sidebar input[type="text"] {
    width: 100%; padding: 8px 12px; border: none; border-radius: 6px;
    font-size: 14px; outline: none;
  }
  
  .sidebar .unit {
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar .unit-header {
    padding: 12px 16px; font-weight: 600; font-size: 14px;
    cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; user-select: none;
  }
  .sidebar .unit-header:hover { background: rgba(255,255,255,0.05); }
  .sidebar .unit-header .arrow { font-size: 12px; transition: transform 0.2s; }
  .sidebar .unit-header.open .arrow { transform: rotate(90deg); }
  
  .sidebar .lesson { display: none; }
  .sidebar .unit.open .lesson { display: block; }
  
  .sidebar .lesson-header {
    padding: 8px 16px 8px 28px; font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; user-select: none;
  }
  .sidebar .lesson-header:hover { background: rgba(255,255,255,0.05); }
  
  .sidebar .ex-list { display: none; }
  .sidebar .lesson.open .ex-list { display: block; }
  
  .sidebar .ex-item {
    padding: 7px 16px 7px 44px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    border-left: 3px solid transparent;
  }
  .sidebar .ex-item:hover { background: rgba(255,255,255,0.08); }
  .sidebar .ex-item.active {
    background: var(--sidebar-active); color: white;
    border-left-color: #e74c3c;
  }
  .sidebar .ex-item .icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .sidebar .ex-item.active .icon { background: rgba(255,255,255,0.2); }
  
  /* Content area */
  .content {
    flex: 1; display: flex; flex-direction: column;
    background: #f0f4ff; overflow: hidden;
  }
  
  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #888;
    text-align: center; padding: 20px;
  }
  .empty-state .big-icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: #555; }
  .empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }
  
  /* Exercise iframe */
  .exercise-frame {
    flex: 1; border: none; width: 100%;
    background: #f0f4ff;
  }
  
  /* Footer */
  .footer {
    height: var(--footer-h); background: white; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 0 16px; flex-shrink: 0;
  }
  .footer .ex-title {
    text-align: center; font-size: 13px; color: #666;
    max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .footer button {
    background: var(--primary); color: white; border: none;
    padding: 8px 20px; border-radius: 6px; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; gap: 6px;
  }
  .footer button:hover { background: #1557b0; }
  .footer button:disabled { opacity: 0.4; cursor: default; background: var(--primary); }
  .footer .audio-btn {
    background: #27ae60; 
  }
  .footer .audio-btn:hover { background: #219a52; }
  .footer .audio-btn.playing { background: #e74c3c; }
  
  /* Mobile responsive */
  @media (max-width: 768px) {
    :root {
      --sidebar-w: 280px;
    }
    .header h1 { font-size: 15px; }
  }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 16px; color: #888;
  }
  .loading::after {
    content: ''; width: 24px; height: 24px; margin-left: 10px;
    border: 3px solid #ddd; border-top: 3px solid var(--primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<!-- Header -->
<div class="header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>Tiếng Anh 1 - Global Success</h1>
  <div class="nav-btns">
    <button id="homeBtn" onclick="goHome()">🏠</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Tìm bài tập..." oninput="filterExercises(this.value)">
    </div>
    <div id="sidebarUnits"></div>
  </div>
  
  <!-- Content -->
  <div class="content" id="contentArea">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">📚</div>
      <h2>Chọn bài tập từ danh sách</h2>
      <p>Dùng menu bên trái hoặc tìm kiếm để chọn bài.<br>
      Mỗi bài bao gồm hình ảnh, âm thanh và bài tập tương tác<br>
      giống như trên sachmem.net.</p>
    </div>
    <iframe class="exercise-frame" id="exerciseFrame" style="display:none"></iframe>
    <div class="loading" id="loadingIndicator" style="display:none">Loading</div>
  </div>
</div>

<!-- Footer -->
<div class="footer" id="footer" style="display:none">
  <button id="prevBtn" onclick="navigate(-1)" disabled>◀ Trước</button>
  <div class="ex-title" id="exTitle">Exercise</div>
  <button id="nextBtn" onclick="navigate(1)">Sau ▶</button>
</div>

let currentIndex = -1;
let sidebarVisible = true;

// ==================== SIDEBAR ====================
function buildSidebar() {
  const container = document.getElementById('sidebarUnits');
  container.innerHTML = '';
  
  UNITS.forEach(unit => {
    const unitDiv = document.createElement('div');
    unitDiv.className = 'unit';
    
    const unitHeader = document.createElement('div');
    unitHeader.className = 'unit-header';
    unitHeader.innerHTML = `${unit.name} <span class="arrow">▶</span>`;
    unitHeader.onclick = () => {
      unitDiv.classList.toggle('open');
      saveSidebarState();
    };
    unitDiv.appendChild(unitHeader);
    
    const lesssonContainer = document.createElement('div');
    lesssonContainer.className = 'lesson';
    
    (unit.sorted_lessons || []).forEach(lesson => {
      const lessonDiv = document.createElement('div');
      lessonDiv.className = 'lesson';
      
      const lessonHeader = document.createElement('div');
      lessonHeader.className = 'lesson-header';
      lessonHeader.innerHTML = `${lesson.name} <span class="arrow">▶</span>`;
      lessonHeader.onclick = (e) => {
        e.stopPropagation();
        lessonDiv.classList.toggle('open');
        saveSidebarState();
      };
      lessonDiv.appendChild(lessonHeader);
      
      const exList = document.createElement('div');
      exList.className = 'ex-list';
      
      (lesson.exercises || []).forEach(ex => {
        const item = document.createElement('div');
        item.className = 'ex-item';
        item.dataset.index = EX_INDEX[ex.id];
        item.innerHTML = `<span class="icon">${getIcon(ex.icon)}</span>${ex.name}`;
        item.onclick = () => loadExercise(EX_INDEX[ex.id]);
        exList.appendChild(item);
      });
      
      lessonDiv.appendChild(exList);
      lesssonContainer.appendChild(lessonDiv);
    });
    
    unitDiv.appendChild(lesssonContainer);
    container.appendChild(unitDiv);
  });
  
  restoreSidebarState();
}

function getIcon(icon) {
  const icons = {
    'listen.repeat': '🔊',
    'listen.repeat.': '🔊',
    'listen.chant': '🎵',
    'listen.tick': '✅',
    'listen.tick.cross': '❌',
    'listen.circle': '⭕',
    'listen.read': '📖',
    'point.say': '👆',
    'say': '💬',
    'sing': '🎤',
    'talk': '🗣️',
    '.talk': '🗣️',
    'play': '🎮',
    '.play': '🎮',
    'look.trace': '✏️',
    'look.trace.write': '✏️',
    'look.trace2': '✏️',
    'look.circle': '⭕',
    'read.tick': '✅',
    'find': '🔍',
    'write': '📝',
    '.write': '📝',
    'write.say': '📝',
    'match.say': '🔗',
    '.match.say': '🔗',
    '.circle.match.say': '🔗',
    '.listen.chant': '🎵',
    '.trace.colour.point.say': '🎨',
    'colour.point.say': '🎨',
    'trace.colour.say': '🎨',
    'read.tick.colour.say': '🎨',
    'find.circle.say': '🔍'
  };
  return icons[icon] || '📄';
}

function saveSidebarState() {
  const state = [];
  document.querySelectorAll('.unit, .lesson').forEach(el => {
    state.push(el.classList.contains('open'));
  });
  try { localStorage.setItem('sidebar_state3', JSON.stringify(state)); } catch(e) {}
}

function restoreSidebarState() {
  try {
    const state = JSON.parse(localStorage.getItem('sidebar_state3'));
    if (!state) return;
    const els = document.querySelectorAll('.unit, .lesson');
    els.forEach((el, i) => {
      if (state[i]) el.classList.add('open');
    });
  } catch(e) {}
}

function filterExercises(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.ex-item').forEach(item => {
    const match = item.textContent.toLowerCase().includes(q);
    item.style.display = match ? 'flex' : 'none';
  });
  // Expand all units/lessons when searching
  document.querySelectorAll('.unit, .lesson').forEach(el => {
    if (q) el.classList.add('open');
  });
}

function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarVisible);
  if (!sidebarVisible) {
    document.getElementById('sidebar').style.display = 'none';
  } else {
    document.getElementById('sidebar').style.display = '';
    document.getElementById('sidebar').classList.remove('collapsed');
  }
}

// ==================== EXERCISE VIEWER ====================
function loadExercise(index) {
  if (index < 0 || index >= EXERCISES.length) return;
  currentIndex = index;
  const ex = EXERCISES[index];
  
  // Update sidebar highlight
  document.querySelectorAll('.ex-item').forEach((el, i) => {
    el.classList.toggle('active', parseInt(el.dataset.index) === index);
  });
  
  // Update footer
  document.getElementById('footer').style.display = 'flex';
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === EXERCISES.length - 1;
  document.getElementById('exTitle').textContent = ex.name;
  
  // Show loading
  const emptyState = document.getElementById('emptyState');
  const frame = document.getElementById('exerciseFrame');
  const loading = document.getElementById('loadingIndicator');
  emptyState.style.display = 'none';
  frame.style.display = 'none';
  loading.style.display = 'flex';
  
  // Load exercise HTML into iframe
  const eid = ex.id;
  frame.onload = () => {
    loading.style.display = 'none';
    frame.style.display = '';
  };
  frame.onerror = () => {
    loading.style.display = 'none';
    frame.style.display = '';
  };
  frame.src = `exercises_standalone/${eid}.html`;
  
  // Save current exercise
  try { localStorage.setItem('current_exercise', index); } catch(e) {}
}

function navigate(delta) {
  loadExercise(currentIndex + delta);
}

function goHome() {
  currentIndex = -1;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('exerciseFrame').style.display = 'none';
  document.getElementById('loadingIndicator').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.querySelectorAll('.ex-item').forEach(el => el.classList.remove('active'));
  try { localStorage.removeItem('current_exercise'); } catch(e) {}
}

// Build EX_INDEX
const EX_INDEX = {};
EXERCISES.forEach((ex, i) => { EX_INDEX[ex.id] = i; });

// ==================== INIT ====================
buildSidebar();

// Restore last exercise
try {
  const last = localStorage.getItem('current_exercise');
  if (last !== null) {
    const idx = parseInt(last);
    if (idx >= 0 && idx < EXERCISES.length) loadExercise(idx);
  }
} catch(e) {}
</script>
